<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="skin1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d0c5"/>
      <stop offset="100%" style="stop-color:#e8b4a8"/>
    </linearGradient>
    <linearGradient id="skin2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c4a8"/>
      <stop offset="100%" style="stop-color:#d4a58c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="225" fill="url(#bg)"/>

  <!-- Interview room background elements -->
  <rect x="20" y="20" width="360" height="185" rx="8" fill="#0f0f23" opacity="0.5"/>
  <rect x="30" y="30" width="340" height="165" rx="4" fill="#1a1a2e" opacity="0.8"/>

  <!-- Table -->
  <rect x="50" y="160" width="300" height="8" fill="#2d2d44"/>
  <rect x="60" y="168" width="10" height="20" fill="#2d2d44"/>
  <rect x="330" y="168" width="10" height="20" fill="#2d2d44"/>

  <!-- Person 1 - Interviewee (left) -->
  <g transform="translate(100, 85)">
    <!-- Body -->
    <ellipse cx="0" cy="55" rx="35" ry="45" fill="#3d5a80"/>
    <!-- Neck -->
    <rect x="-8" y="25" width="16" height="15" fill="url(#skin1)"/>
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="28" ry="32" fill="url(#skin1)"/>
    <!-- Hair -->
    <path d="M-28,-5 Q-28,-35 0,-38 Q28,-35 28,-5 Q28,5 25,8 Q20,-5 0,-5 Q-20,-5 -25,8 Q-28,5 -28,-5" fill="#1a1a1a"/>
    <!-- Eyes -->
    <ellipse cx="-10" cy="2" rx="4" ry="3" fill="#1a1a1a"/>
    <ellipse cx="10" cy="2" rx="4" ry="3" fill="#1a1a1a"/>
    <!-- Nose -->
    <path d="M-2,8 L0,15 L2,8" fill="#d4a090"/>
    <!-- Mouth -->
    <ellipse cx="0" cy="22" rx="6" ry="3" fill="#c97b6d"/>
  </g>

  <!-- Person 2 - Interviewer (right) -->
  <g transform="translate(280, 85)">
    <!-- Body -->
    <ellipse cx="0" cy="55" rx="35" ry="45" fill="#2d4a5e"/>
    <!-- Neck -->
    <rect x="-8" y="25" width="16" height="15" fill="url(#skin2)"/>
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="28" ry="32" fill="url(#skin2)"/>
    <!-- Hair -->
    <path d="M-28,-8 Q-28,-38 0,-40 Q28,-38 28,-8 Q28,2 26,5 L26,-5 Q0,-15 -26,-5 L26,5 Q-26,2 -28,-8" fill="#2d2d2d"/>
    <!-- Eyes -->
    <ellipse cx="-10" cy="2" rx="4" ry="3" fill="#1a1a1a"/>
    <ellipse cx="10" cy="2" rx="4" ry="3" fill="#1a1a1a"/>
    <!-- Nose -->
    <path d="M-2,8 L0,15 L2,8" fill="#c98b70"/>
    <!-- Mouth -->
    <ellipse cx="0" cy="22" rx="5" ry="2" fill="#b86b5d"/>
  </g>

  <!-- Recording indicator -->
  <circle cx="40" cy="45" r="6" fill="#ff4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="52" y="49" font-family="Arial, sans-serif" font-size="10" fill="#ff4444" font-weight="bold">REC</text>

  <!-- Timestamp -->
  <text x="320" y="49" font-family="monospace" font-size="10" fill="#aaa">15:30:22</text>

  <!-- Interview label -->
  <rect x="150" y="190" width="100" height="22" rx="11" fill="#3b82f6" opacity="0.9" filter="url(#shadow)"/>
  <text x="200" y="205" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">สอบสวนพยาน</text>
</svg>